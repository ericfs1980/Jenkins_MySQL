### Banco DEV

services:
  mysql-dev:
    image: mysql:8.0
    restart: unless-stopped
    networks:
      - app-network
    
    environment:
      MYSQL_DATABASE: app_dev
      MYSQL_USER: app_user
      MYSQL_PASSWORD: dev123
      MYSQL_ROOT_PASSWORD: root

    ports:
      - "3307:3306"

    volumes:
      - mysql_dev_data:/var/lib/mysql

    command: --default-authentication-plugin=mysql_native_password

  flyway:
    environment:
      FLYWAY_URL: jdbc:mysql://mysql-dev:3306/app_dev
      FLYWAY_USER: app_user
      FLYWAY_PASSWORD: dev123

    depends_on:
      - mysql-dev

volumes:
  mysql_dev_data:

