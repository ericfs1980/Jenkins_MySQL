### PROD

services:
  mysql-prod:
    image: mysql:8.0
    restart: unless-stopped
    networks:
      - app-network

    environment:
      MYSQL_DATABASE: app_prod
      MYSQL_USER: app_user
      MYSQL_PASSWORD: ${MYSQL_APP_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}

    ports:
      - "127.0.0.1:3308:3306"

    volumes:
      - mysql_prod_data:/var/lib/mysql

    command: --default-authentication-plugin=mysql_native_password

  flyway:
    environment:
      FLYWAY_URL: jdbc:mysql://mysql-prod:3306/app_prod
      FLYWAY_USER: app_user
      FLYWAY_PASSWORD: ${MYSQL_APP_PASSWORD}

    depends_on:
      - mysql-prod

volumes:
  mysql_prod_data:

### Subir o container de PROD
### docker compose --env-file .env -f up -d