services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: jenkins

    ports:
      - "8084:8080"
      - "50000:50000"

    volumes:
      - jenkins_home:/var/jenkins_home
      - //var/run/docker.sock:/var/run/docker.sock

    user: root
    privileged: true

volumes:
  jenkins_home: